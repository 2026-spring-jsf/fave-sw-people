<ul class="list-group">
  <li class="list-group-item list-group-item-secondary text-black-50">
      Mike's Faves
      <button 
        class="btn btn-sm btn-primary ms-1"
        (click)="postToMsTeams()"
        >Post X {{ selectedCount() }}
      </button>
      <button class="btn btn-sm btn-link" (click)="clearSelected()">Clear</button>
    </li>
  

    @for (p of swPeople(); track p) {
      <li class="list-group-item">
        <label>
          <input 
          type="checkbox" 
          class="form-check-input me-1" 
          [checked]="p.checked"
          (change)="toggleChecked(p)"
          />
          {{ p.name }}</label>
      </li>
    }
</ul>
