<ul class="list-group">
    <li class="list-group-item list-group-item-secondary text-black-50">
        Craig's Faves
    </li>

    <li class="list-group-item">
        <button class="btn btn-link" (click)="promisesAsThenables()">
            Promises as 'then-ables'
        </button>
    </li>

    @for (p of people$ | async; track p) {
        <li class="list-group-item">
            <input class="form-check-input me-1" type="checkbox" />
            <label>{{ p }}</label>
        </li>
    }
</ul>
